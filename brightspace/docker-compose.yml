services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BRIGHTSPACE_BASE_URL=https://dlo.mijnhva.nl
      - BRIGHTSPACE_CATEGORY_CONFIG=/app/categories.toml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
