<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Brightspace Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 420px;
      min-height: 120px;
      padding: 16px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .status { font-size: 13px; color: #555; margin-bottom: 10px; }
    .error { color: #c0392b; font-size: 13px; margin-top: 8px; }
    .unsupported { color: #888; font-size: 13px; }

    button {
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #106ebe; }
    button:disabled { background: #aaa; cursor: default; }

    select {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin-right: 8px;
    }

    .controls { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }

    .loader {
      display: none;
      font-size: 13px;
      color: #555;
      margin-top: 8px;
    }
    .loader.active { display: block; }

    .result-info {
      font-size: 13px;
      color: #333;
      margin: 8px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 8px;
    }
    th, td {
      text-align: left;
      padding: 5px 8px;
      border-bottom: 1px solid #e0e0e0;
    }
    th { background: #f0f0f0; font-weight: 600; }

    .copy-btn {
      background: #555;
      font-size: 12px;
      padding: 4px 10px;
      margin-top: 8px;
    }
    .copy-btn:hover { background: #333; }
  </style>
</head>
<body>
  <h1>Brightspace Extractor</h1>
  <div id="status" class="status"></div>
  <div id="controls" class="controls" style="display:none;">
    <select id="format-select" style="display:none;">
      <option value="markdown">Markdown</option>
      <option value="json">JSON</option>
      <option value="pdf">PDF</option>
    </select>
    <button id="extract-btn">Extract</button>
  </div>
  <div id="loader" class="loader">Extracting…</div>
  <div id="error" class="error" style="display:none;"></div>
  <div id="result-info" class="result-info" style="display:none;"></div>
  <div id="result" style="display:none;"></div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
